<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLPRODUÇÕES | Direção Visual de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000;
            --fg: #fff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Reset Geral */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Cursor apenas para quem tem mouse */
        @media (hover: hover) {
            * { cursor: none; }
            #cursor {
                position: fixed; width: 10px; height: 10px; background: #fff;
                border-radius: 50%; pointer-events: none; z-index: 9999;
                mix-blend-mode: difference;
            }
            #cursor-follower {
                position: fixed; width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.2);
                border-radius: 50%; pointer-events: none; z-index: 9998;
                transition: transform 0.15s var(--ease);
            }
        }

        body { 
            background: var(--bg); color: var(--fg); 
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center;
            justify-content: center; transition: 1s var(--ease);
        }
        #preloader span {
            font-family: 'Playfair Display'; font-size: clamp(1rem, 5vw, 1.5rem); 
            letter-spacing: 10px; animation: pulse 2s infinite; font-weight: 900;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Ruído de fundo sutil */
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9997; opacity: 0.05; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container { max-width: 1600px; margin: 0 auto; padding: 0 5vw; }

        /* Header Adaptável */
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 0; z-index: 1000;
            mix-blend-mode: difference;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        
        .logo-circle { 
            width: clamp(50px, 10vw, 75px); height: clamp(50px, 10vw, 75px); 
            border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; 
        }
        .logo-circle img { width: 75%; height: 75%; object-fit: contain; }

        /* Hero - Tipografia Responsiva */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            padding-top: 60px;
        }
        .hero h1 {
            font-family: 'Playfair Display'; 
            font-size: clamp(3.5rem, 18vw, 18rem);
            line-height: 0.8; text-transform: uppercase; font-style: italic;
            white-space: nowrap;
        }

        /* Trabalhos - Grid Mobile-First */
        .work-section { padding: 10vh 0; }
        .work-item {
            position: relative; margin-bottom: 15vh;
            filter: grayscale(1); transition: 1s var(--ease);
            width: 100%;
        }
        @media (min-width: 768px) {
            .work-item { width: 80%; }
            .work-right { margin-left: auto; }
        }

        .work-item:hover { filter: grayscale(0); }
        .img-container { width: 100%; height: 60vh; overflow: hidden; border-radius: 2px; }
        @media (min-width: 768px) { .img-container { height: 80vh; } }

        .work-item img {
            width: 100%; height: 100%; object-fit: cover;
            transform: scale(1.1); transition: 1.5s var(--ease);
        }
        .work-item:hover img { transform: scale(1); }

        .work-item h3 {
            position: absolute; bottom: -20px; left: 10px;
            font-size: clamp(2.5rem, 10vw, 7vw); 
            font-family: 'Playfair Display'; font-style: italic;
            z-index: 10; text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }
        @media (min-width: 768px) { .work-right h3 { left: auto; right: 20px; } }

        /* Botões */
        .cta-button {
            background: #fff; color: #000; padding: clamp(15px, 3vw, 25px) clamp(30px, 6vw, 50px); 
            border-radius: 100px; text-decoration: none; font-weight: 900; 
            font-size: clamp(0.6rem, 2vw, 0.75rem); letter-spacing: 3px; 
            text-transform: uppercase; transition: 0.3s var(--ease);
            display: inline-block;
        }
        .cta-button:hover { background: #000; color: #fff; transform: scale(1.05); border: 1px solid #fff; }

        /* Marquee */
        .marquee-wrap { border-top: 1px solid #111; border-bottom: 1px solid #111; padding: 30px 0; overflow: hidden; }
        .marquee { display: flex; animation: scrollMarquee 20s linear infinite; }
        .marquee span { 
            font-size: clamp(3rem, 10vw, 8vw); font-family: 'Playfair Display'; 
            -webkit-text-stroke: 1px #333; color: transparent; padding-right: 50px;
        }
        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Footer */
        footer { padding: 60px 0; text-align: center; color: #222; letter-spacing: 5px; font-size: 0.6rem; }

        /* Ajustes Mobile Específicos */
        @media (max-width: 768px) {
            .hero-footer { flex-direction: column; align-items: flex-start !important; gap: 30px; }
            .hero h1 { margin-left: 0 !important; }
            .hero p { font-size: 0.6rem; }
            #cursor, #cursor-follower { display: none; }
        }
    </style>
</head>

<body>

<div id="preloader"><span>BLPRODUÇÕES</span></div>
<div class="noise"></div>

<!-- Cursor apenas renderiza se não for touch -->
<div id="cursor"></div>
<div id="cursor-follower"></div>

<header>
    <div class="container nav-content">
        <div class="logo-wrap magnetic-target">
            <div class="logo-circle">
                <img src="logo.png" alt="BL">
            </div>
        </div>
        <a href="https://wa.me/5599999999999" class="cta-button magnetic-target">Reservar</a>
    </div>
</header>

<main class="container">

    <section class="hero">
        <h1 class="parallax-text" data-speed="-1">Além</h1>
        <h1 class="parallax-text" data-speed="1" style="margin-left: 10vw;">Da Lente</h1>
        
        <div class="hero-footer" style="margin-top: 8vh; display: flex; justify-content: space-between; align-items: flex-end;">
            <p style="max-width: 300px; color: #555; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; line-height: 1.8;">
                Direção visual estratégica. Cinema e arte integrados em identidades de alto impacto.
            </p>
            <a href="#trabalhos" class="cta-button magnetic-target">Ver Projetos</a>
        </div>
    </section>

    <div class="marquee-wrap">
        <div class="marquee">
            <span>ESTÉTICA</span><span>CINEMA</span><span>MODA</span><span>NARRATIVA</span>
            <span>ESTÉTICA</span><span>CINEMA</span><span>MODA</span><span>NARRATIVA</span>
        </div>
    </div>

    <section id="trabalhos" class="work-section">
        <div class="work-item work-right">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=2000">
            </div>
            <h3>Editorial</h3>
        </div>

        <div class="work-item">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=2000">
            </div>
            <h3>Movimento</h3>
        </div>
    </section>

    <section style="padding: 100px 0; text-align: center;">
        <h2 style="font-family: Playfair Display; font-size: clamp(2.5rem, 8vw, 6vw); font-style: italic; margin-bottom: 40px;">Sua visão, nossa lente.</h2>
        <a href="https://wa.me/5599999999999" class="cta-button magnetic-target" style="padding: 30px 60px; font-size: 1rem;">Iniciar Narrativa</a>
    </section>

</main>

<footer>BLPRODUÇÕES // 2026</footer>

<script>
    // Preloader
    window.addEventListener('load', () => {
        setTimeout(() => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.remove(), 1000);
            }
        }, 1000);
    });

    // Lógica de Mouse (Cursor e Magnetismo) - Apenas se houver mouse
    if (window.matchMedia("(hover: hover)").matches) {
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        const magneticTargets = document.querySelectorAll('.magnetic-target');

        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX - 5}px, ${e.clientY - 5}px, 0)`;
            follower.style.transform = `translate3d(${e.clientX - 15}px, ${e.clientY - 15}px, 0)`;

            magneticTargets.forEach(target => {
                const rect = target.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dist = Math.hypot(e.clientX - centerX, e.clientY - centerY);

                if (dist < 100) {
                    target.style.transform = `translate3d(${(e.clientX - centerX) * 0.3}px, ${(e.clientY - centerY) * 0.3}px, 0)`;
                } else {
                    target.style.transform = `translate3d(0, 0, 0)`;
                }
            });
        });
    }

    // Parallax Suave (Funciona em todos, mas limitado no mobile)
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        const isMobile = window.innerWidth < 768;
        
        document.querySelectorAll('.parallax-text').forEach(text => {
            const speed = text.getAttribute('data-speed');
            // No mobile o movimento é 50% mais sutil para evitar cortes
            const factor = isMobile ? 0.05 : 0.15; 
            text.style.transform = `translateX(${scrolled * speed * factor}px)`;
        });
    });
</script>

</body>
</html>
