<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLPRODUÇÕES | Direção Visual de Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>

    <style>
        :root {
            --bg: #000;
            --fg: #fff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--fg); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9997; opacity: 0.08; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        @media (hover: hover) {
            * { cursor: none !important; }
            #cursor {
                position: fixed; width: 8px; height: 8px; background: #fff;
                border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: difference;
            }
            #cursor-follower {
                position: fixed; width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.3);
                border-radius: 50%; pointer-events: none; z-index: 9998; transition: transform 0.1s linear;
            }
        }

        #preloader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center; transition: 1.2s var(--ease);
        }
        #preloader span { font-family: 'Playfair Display'; font-size: 1.2rem; letter-spacing: 15px; font-weight: 900; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .container { max-width: 1600px; margin: 0 auto; padding: 0 5vw; }

        header { position: fixed; top: 0; width: 100%; padding: 30px 0; z-index: 1000; mix-blend-mode: difference; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo-circle { width: 60px; height: 60px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; }
        .logo-circle img { width: 70%; height: 70%; object-fit: contain; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 16vw, 15rem); line-height: 0.85; text-transform: uppercase; font-style: italic; white-space: nowrap; }

        /* Projetos Grid */
        .work-section { padding: 15vh 0; }
        .work-item { position: relative; margin-bottom: 20vh; width: 100%; cursor: pointer; }
        @media (min-width: 768px) { .work-item { width: 70%; } .work-right { margin-left: auto; } }
        
        .img-wrapper { width: 100%; height: 70vh; overflow: hidden; border-radius: 2px; background: #0a0a0a; position: relative; }
        .work-item img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.1); transition: 1.5s var(--ease); filter: grayscale(0.6); }
        .work-item:hover img { transform: scale(1); filter: grayscale(0); }
        
        /* Badge para induzir o clique */
        .click-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #000; padding: 10px 20px; border-radius: 50px;
            font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; opacity: 0; transition: 0.5s var(--ease);
        }
        .work-item:hover .click-hint { opacity: 1; }

        .work-item h3 {
            position: absolute; bottom: -30px; left: -10px; font-family: 'Playfair Display';
            font-size: clamp(2rem, 8vw, 5rem); font-style: italic; z-index: 10;
            text-shadow: 10px 10px 30px rgba(0,0,0,0.5); pointer-events: none;
        }

        .cta-button {
            background: #fff; color: #000; padding: 20px 45px; border-radius: 100px;
            text-decoration: none; font-weight: 900; font-size: 0.7rem; letter-spacing: 4px;
            text-transform: uppercase; transition: 0.4s var(--ease); display: inline-block; border: 1px solid transparent;
        }

        /* Overlay do Projeto */
        #project-view {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: none; padding: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        
        /* Indicador de Scroll dentro do album */
        .scroll-indicator {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; color: #fff; font-size: 10px; letter-spacing: 5px;
            animation: bounce 2s infinite; z-index: 10; pointer-events: none;
        }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translate(-50%, 0);} 40% {transform: translate(-50%, -10px);} 60% {transform: translate(-50%, -5px);} }

        .project-header { height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .project-header img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .project-header h2 { position: relative; z-index: 2; font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 8rem); font-style: italic; text-align: center; }

        .project-grid { padding: 5vh 5vw; display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 768px) { .project-grid { grid-template-columns: 1fr 1fr; } }
        .project-grid img { width: 100%; border-radius: 4px; }

        .close-btn { 
            position: fixed; top: 30px; right: 30px; width: 50px; height: 50px; 
            background: #fff; color: #000; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1.5rem; 
            z-index: 2100; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Admin */
        #admin-panel { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; padding: 10vh 5vw; overflow-y: auto; }
        .admin-box { max-width: 600px; margin: 0 auto; background: #0a0a0a; padding: 40px; border: 1px solid #111; }
        .admin-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #222; color: #fff; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; font-size: 12px; }

        footer { padding: 100px 0; text-align: center; }
        .foot-link { color: #333; text-decoration: none; font-size: 0.6rem; letter-spacing: 5px; display: block; margin-bottom: 15px; }
        .copyright { color: #111; font-size: 0.5rem; letter-spacing: 3px; cursor: pointer; }

    </style>
</head>

<body>

<div id="preloader"><span>BLPRODUÇÕES</span></div>
<div class="noise"></div>
<div id="cursor"></div>
<div id="cursor-follower"></div>

<!-- Modal Administrador -->
<div id="admin-panel">
    <span class="close-btn" onclick="closeAdmin()">&times;</span>
    <div class="admin-box">
        <h2 style="font-family: 'Playfair Display'; margin-bottom: 30px;">Moderador</h2>
        <input type="text" id="proj-title" placeholder="Nome do Projeto">
        <input type="file" id="proj-files" multiple accept="image/*">
        <button onclick="handleUpload()" class="cta-button" id="upload-btn" style="width: 100%;">Publicar Obra</button>
        <div id="manage-list" style="margin-top:30px;"></div>
    </div>
</div>

<!-- Visualização de Projeto (Corrigida) -->
<div id="project-view">
    <span class="close-btn" onclick="closeProject()">&times;</span>
    
    <div class="project-header">
        <img id="view-cover" src="" alt="">
        <h2 id="view-title"></h2>
        <div class="scroll-indicator">
            <p>DESCER</p>
            <p>↓</p>
        </div>
    </div>

    <div class="project-grid" id="view-grid">
        <!-- Outras fotos entram aqui -->
    </div>

    <div style="text-align: center; padding: 100px 0;">
        <button onclick="closeProject()" class="cta-button">Fechar Galeria</button>
    </div>
</div>

<header>
    <div class="container nav-content">
        <div class="logo-wrap magnetic-target">
            <div class="logo-circle"><img src="logo.png" alt="BL"></div>
        </div>
        <a href="https://wa.me/5531985534292" class="cta-button magnetic-target">Reservar</a>
    </div>
</header>

<main>
    <section class="container hero">
        <h1 class="parallax-text" data-speed="-1">Além</h1>
        <h1 class="parallax-text" data-speed="1" style="margin-left: 15vw;">Da Lente</h1>
        <div style="margin-top: 10vh; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px;">
            <p style="max-width: 350px; color: #444; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; line-height: 2;">
                Narrativas visuais de alto padrão. Direção de arte e cinema fundidos para criar identidades inesquecíveis.
            </p>
            <a href="#trabalhos" class="cta-button magnetic-target">Portfólio</a>
        </div>
    </section>

    <section id="trabalhos" class="container work-section">
        <div id="feed-projetos">
            <p style="text-align: center; letter-spacing: 5px; color: #222;">SINCRONIZANDO ACERVO...</p>
        </div>
    </section>
</main>

<footer>
    <a href="https://www.instagram.com/blproducoe.s?igsh=OG56eXAxbnVub3Bh" target="_blank" class="foot-link magnetic-target">INSTAGRAM // @BLPRODUCOES_</a>
    <span class="copyright" onclick="openAdminPortal()">BLPRODUÇÕES &copy; 2026 // ACESSO PRIVADO</span>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAf_6A_0Qff3Jvx0oBkWGCH_5sWQgqsl5w",
        authDomain: "bl-portfolio-90f61.firebaseapp.com",
        projectId: "bl-portfolio-90f61",
        storageBucket: "bl-portfolio-90f61.firebasestorage.app",
        messagingSenderId: "35035346215",
        appId: "1:35035346215:web:28f36b81f5197996d9a502",
        measurementId: "G-P3FQQSMTC7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allProjects = [];

    const lenis = new Lenis();
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    async function loadContent() {
        const feed = document.getElementById('feed-projetos');
        const manage = document.getElementById('manage-list');
        try {
            const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            feed.innerHTML = '';
            manage.innerHTML = '<h4 style="margin-bottom:15px;">Gerenciar</h4>';
            allProjects = [];

            snapshot.forEach((docSnap, index) => {
                const data = docSnap.data();
                data.id = docSnap.id;
                allProjects.push(data);

                const item = document.createElement('div');
                item.className = `work-item ${index % 2 !== 0 ? 'work-right' : ''}`;
                item.innerHTML = `
                    <div class="img-wrapper" onclick="viewProject('${data.id}')">
                        <img src="${data.images[0]}" alt="${data.title}">
                        <div class="click-hint">VER PROJETO</div>
                    </div>
                    <h3>${data.title}</h3>
                `;
                feed.appendChild(item);

                const mItem = document.createElement('div');
                mItem.className = 'manage-item';
                mItem.innerHTML = `<span>${data.title}</span><button onclick="deleteProject('${data.id}')" style="color:red; background:none; border:none; cursor:pointer;">EXCLUIR</button>`;
                manage.appendChild(mItem);
            });
        } catch (e) { console.error(e); }
    }

    window.handleUpload = async () => {
        const title = document.getElementById('proj-title').value;
        const files = document.getElementById('proj-files').files;
        if (!title || files.length === 0) return alert("Título e fotos são obrigatórios.");
        document.getElementById('upload-btn').innerText = "COMPRIMINDO...";
        
        const compressedImages = [];
        for (let file of files) {
            const img = await compressImage(file);
            compressedImages.push(img);
        }

        await addDoc(collection(db, "projects"), { title, images: compressedImages, createdAt: new Date() });
        location.reload();
    };

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    window.deleteProject = async (id) => {
        if (confirm("Excluir projeto?")) { await deleteDoc(doc(db, "projects", id)); loadContent(); }
    };

    window.viewProject = (id) => {
        const p = allProjects.find(x => x.id === id);
        const grid = document.getElementById('view-grid');
        document.getElementById('view-title').innerText = p.title;
        document.getElementById('view-cover').src = p.images[0];
        grid.innerHTML = '';
        
        // Começa da segunda imagem na grid
        p.images.slice(1).forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            grid.appendChild(img);
        });

        const view = document.getElementById('project-view');
        view.style.display = 'block';
        view.scrollTop = 0; // Volta pro topo ao abrir
        lenis.stop(); // Para o scroll do fundo
    };

    window.closeProject = () => {
        document.getElementById('project-view').style.display = 'none';
        lenis.start(); // Volta o scroll do fundo
    };

    window.addEventListener('load', loadContent);
</script>

<script>
    function openAdminPortal() {
        if (prompt("Chave de Acesso:") === "bl2026") document.getElementById('admin-panel').style.display = 'block';
    }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    window.addEventListener('load', () => {
        setTimeout(() => { document.getElementById('preloader').style.opacity = '0'; setTimeout(() => document.getElementById('preloader').remove(), 1200); }, 1500);
    });

    if (window.matchMedia("(hover: hover)").matches) {
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
            follower.style.transform = `translate3d(${e.clientX - 20}px, ${e.clientY - 20}px, 0)`;
        });
    }

    window.addEventListener('scroll', () => {
        const s = window.pageYOffset;
        document.querySelectorAll('.parallax-text').forEach(el => {
            el.style.transform = `translateX(${s * el.dataset.speed * 0.1}px)`;
        });
    });
</script>

</body>
</html>
